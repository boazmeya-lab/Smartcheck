<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SmartCheck by Smartech</title>

<!-- CONFIGURATION PWA -->
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#2ec4b6">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<!-- IMPORTATION DU SCANNEUR -->
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
:root {
    --primary: #2ec4b6; /* Un vert émeraude/turquoise très moderne */
    --primary-dark: #0f9f90;
    --success: #2ecc71;
    --danger: #e74c3c;
    --dark: #2c3e50;
    --bg: #f4f9f8; /* Fond blanc teinté de vert très léger */
}

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: var(--bg);
    margin: 0;
    padding: 15px;
    color: var(--dark);
    -webkit-user-select: none;
}

/* En-tête de l'application */
.header-container {
    margin-top: 15px;
    margin-bottom: 25px;
}

h1 {
    color: var(--dark);
    font-size: 28px;
    margin: 0;
    font-weight: 700;
    letter-spacing: -0.5px;
}

h1 span {
    color: var(--primary); /* Met le "Check" en vert */
}

.brand-subtitle {
    font-size: 11px;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #94a3b8;
    margin-top: 2px;
}

.sub-title {
    font-size: 14px;
    color: #7f8c8d;
    margin-top: 5px;
}

.card {
    background: white;
    padding: 20px;
    margin: 15px auto;
    max-width: 450px;
    border-radius: 20px;
    box-shadow: 0 4px 20px rgba(46, 196, 182, 0.08);
    box-sizing: border-box;
}

.stats-grid {
    display: flex;
    justify-content: space-around;
    margin-bottom: 10px;
}

.stat-box {
    text-align: center;
}

.stat-number {
    font-size: 26px;
    font-weight: bold;
    color: var(--primary);
}

.stat-label {
    font-size: 12px;
    color: #95a5a6;
}

button.btn-main {
    background: var(--primary);
    color: white;
    border: none;
    width: 100%;
    padding: 16px;
    font-size: 18px;
    font-weight: bold;
    border-radius: 14px;
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(46, 196, 182, 0.25);
    transition: background 0.2s, transform 0.1s;
}

button.btn-main:hover {
    background: var(--primary-dark);
}

button.btn-main:active {
    transform: scale(0.98);
}

#reader {
    width: 100%;
    margin: 15px auto 0 auto;
    border-radius: 14px;
    overflow: hidden;
    border: none !important;
}

.guest-list {
    text-align: left;
    max-height: 250px;
    overflow-y: auto;
    margin-top: 15px;
}

.guest-item {
    padding: 12px 15px;
    border-bottom: 1px solid #f1f9f8;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 15px;
}

.guest-time {
    font-size: 11px;
    color: #bdc3c7;
}

.badge {
    background: rgba(46, 204, 113, 0.12);
    color: var(--success);
    padding: 4px 8px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: bold;
}

.btn-clear {
    background: none;
    border: none;
    color: var(--danger);
    font-size: 13px;
    cursor: pointer;
    margin-top: 15px;
    text-decoration: underline;
}

#scan-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 9999;
    justify-content: center;
    align-items: center;
    color: white;
    font-size: 24px;
    font-weight: bold;
    text-align: center;
    padding: 20px;
}
</style>
</head>
<body>

<!-- EN-TÊTE SMARTCHECK BY SMARTECH -->
<div class="header-container">
    <div class="brand-subtitle">By Smartech</div>
    <h1>Smart<span>Check</span></h1>
    <div class="sub-title">Gestion des Entrées Mariage</div>
</div>

<!-- CARTE DU SCANNEUR -->
<div class="card">
    <div class="stats-grid">
        <div class="stat-box">
            <div id="count-total" class="stat-number">0</div>
            <div class="stat-label">Invités Scannés</div>
        </div>
    </div>
    
    <button id="start-btn" class="btn-main" onclick="demarrerScan()">📷 Ouvrir le Scanneur</button>
    <div id="reader"></div>
</div>

<!-- CARTE DE L'HISTORIQUE -->
<div class="card">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h3 style="margin: 0; font-size: 18px;">Derniers Invités Validés</h3>
        <button class="btn-clear" onclick="viderListe()">Réinitialiser</button>
    </div>
    
    <div id="liste-invites" class="guest-list">
        <!-- Les invités apparaîtront ici -->
    </div>
</div>

<!-- ÉCRAN FLASH DE VALIDATION (VERT OU ROUGE) -->
<div id="scan-overlay"></div>

<script>
let html5QrcodeScanner;
let invitesScannes = JSON.parse(localStorage.getItem('wedding_guests')) || [];

MettreAJourAffichage();

function demarrerScan() {
    document.getElementById('start-btn').style.display = 'none';

    html5QrcodeScanner = new Html5QrcodeScanner(
        "reader", 
        { fps: 15, qrbox: { width: 230, height: 230 } },
        false
    );
    html5QrcodeScanner.render(onScanSuccess, onScanFailure);
}

function onScanSuccess(decodedText) {
    let nomInvite = decodedText.trim();
    let existeDeja = invitesScannes.some(guest => guest.nom.toLowerCase() === nomInvite.toLowerCase());
    
    if (existeDeja) {
        declencherFlash('Déjà Scanné ! ⚠️', 'var(--danger)');
    } else {
        let maintenant = new Date();
        let heure = maintenant.getHours().toString().padStart(2, '0') + ':' + maintenant.getMinutes().toString().padStart(2, '0');
        
        invitesScannes.unshift({ nom: nomInvite, heure: heure });
        localStorage.setItem('wedding_guests', JSON.stringify(invitesScannes));
        
        declencherFlash('Accès Autorisé ✅<br><span style="font-size:18px;font-weight:normal;">' + nomInvite + '</span>', 'var(--success)');
        MettreAJourAffichage();
    }
    
    html5QrcodeScanner.clear();
    setTimeout(() => {
        demarrerScan();
    }, 2000);
}

function onScanFailure(error) {}

function declencherFlash(message, couleur) {
    let overlay = document.getElementById('scan-overlay');
    overlay.style.backgroundColor = couleur;
    overlay.innerHTML = message;
    overlay.style.display = 'flex';
    
    if (navigator.vibrate) navigator.vibrate([200]);

    setTimeout(() => {
        overlay.style.display = 'none';
    }, 2000);
}

function MettreAJourAffichage() {
    let listeDiv = document.getElementById('liste-invites');
    let compteurDiv = document.getElementById('count-total');
    
    compteurDiv.innerText = invitesScannes.length;
    
    if (invitesScannes.length === 0) {
        listeDiv.innerHTML = '<p style="color:#bdc3c7; text-align:center; margin-top:20px;">Aucun invité enregistré pour le moment.</p>';
        return;
    }
    
    listeDiv.innerHTML = '';
    invitesScannes.forEach(guest => {
        listeDiv.innerHTML += `
            <div class="guest-item">
                <div>
                    <strong>${guest.nom}</strong><br>
                    <span class="guest-time">Scanné à ${guest.heure}</span>
                </div>
                <span class="badge">Présent</span>
            </div>
        `;
    });
}

function viderListe() {
    if (confirm("Voulez-vous vraiment vider la liste des invités présents ?")) {
        invitesScannes = [];
        localStorage.removeItem('wedding_guests');
        MettreAJourAffichage();
    }
}

// ENREGISTREMENT DU SERVICE WORKER POUR LA PWA
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js')
            .then(reg => console.log('Service Worker PWA enregistré !', reg))
            .catch(err => console.error('Erreur Service Worker :', err));
    });
}
</script>

</body>
</html>
