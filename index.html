<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartCheck</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f5f5;
margin:0;
padding:20px;
text-align:center;
}

h1{
color:#007bff;
}

.card{
background:white;
padding:20px;
margin:20px auto;
max-width:400px;
border-radius:15px;
box-shadow:0 2px 10px rgba(0,0,0,.15);
}

button{
background:#007bff;
color:white;
border:none;
padding:15px 25px;
font-size:18px;
border-radius:10px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}
</style>

</head>

<body>

<h1>🎉 SmartCheck</h1>

<div class="card">
<h2>Scanner un QR Code</h2>

<button>📷 Scanner</button>

</div>

<div class="card">
<h2>Invités</h2>

<p>Aucun invité enregistré.</p>
</div>

</body>
  </html>
